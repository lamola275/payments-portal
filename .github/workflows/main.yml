name: Security CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Verify project structure
        run: |
          echo "✅ Pipeline triggered on code push"
          echo "✅ Checking project files..."
          ls

      - name: Check package.json exists
        run: |
          if [ -f package.json ]; then
            echo "✅ package.json found"
          else
            echo "❌ package.json missing"
            exit 1
          fi

      - name: Check source folders exist
        run: |
          if [ -d artifacts ] && [ -d lib ]; then
            echo "✅ Source folders found"
          else
            echo "❌ Source folders missing (expected artifacts/ and lib/)"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Pipeline complete
        run: |
          echo "✅ All checks passed"
          echo "✅ Code is safe to deploy"
